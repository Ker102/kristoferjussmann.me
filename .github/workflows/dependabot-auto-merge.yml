# Auto-merge Dependabot PRs for non-major dependency updates after checks pass.
# https://docs.github.com/en/code-security/dependabot/working-with-dependabot/automating-dependabot-with-github-actions

name: Dependabot Auto-Merge

on:
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened
      - labeled
      - ready_for_review

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: dependabot-auto-merge-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  dependabot-auto-merge:
    runs-on: ubuntu-latest
    if: |
      github.event.pull_request.user.login == 'dependabot[bot]' &&
      github.repository == 'Ker102/Ker102blog' &&
      github.event.pull_request.base.ref == 'main' &&
      github.event.pull_request.draft == false
    steps:
      - name: Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Decide auto-merge eligibility
        id: eligibility
        shell: bash
        run: |
          case "${{ steps.metadata.outputs.update-type }}" in
            version-update:semver-patch|version-update:semver-minor)
              echo "eligible=true" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "eligible=false" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Add labels based on update type
        uses: actions/github-script@v7
        with:
          script: |
            const updateType = '${{ steps.metadata.outputs.update-type }}';
            const dependencyType = '${{ steps.metadata.outputs.dependency-type }}';
            const eligible = '${{ steps.eligibility.outputs.eligible }}' === 'true';
            const labels = [];

            if (updateType === 'version-update:semver-major') {
              labels.push('major-update');
            } else if (updateType === 'version-update:semver-minor') {
              labels.push('minor-update');
            } else if (updateType === 'version-update:semver-patch') {
              labels.push('patch-update');
            }

            if (dependencyType === 'direct:production') {
              labels.push('production');
            } else if (dependencyType === 'direct:development') {
              labels.push('development');
            } else if (dependencyType === 'indirect') {
              labels.push('transitive');
            }

            if (eligible) {
              labels.push('automerge');
            }

            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                labels: labels
              });
            }

      - name: Approve eligible Dependabot PR
        if: steps.eligibility.outputs.eligible == 'true'
        run: gh pr review --approve "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge for eligible Dependabot PR
        if: steps.eligibility.outputs.eligible == 'true'
        run: gh pr merge --auto --squash --delete-branch "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
